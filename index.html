<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinVault | Premium Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-slate-200/60 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-xl shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight gradient-text">FinVault Pro</span>
        </div>
        
        <div class="flex items-center gap-4 bg-slate-100 p-1 rounded-2xl border border-slate-200">
            <button id="role-Viewer" onclick="updateRole('Viewer')" class="px-5 py-2 rounded-xl text-xs font-bold transition-all duration-300">Viewer</button>
            <button id="role-Admin" onclick="updateRole('Admin')" class="px-5 py-2 rounded-xl text-xs font-bold transition-all duration-300">Admin</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-10 space-y-10">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Financial Overview</h1>
                <p id="date-display" class="text-slate-500 font-medium"></p>
            </div>
            <div id="admin-actions" class="hidden">
                <button onclick="alert('Module: Add Transaction Initialized')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-100 transition-all active:scale-95 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    Add Transaction
                </button>
            </div>
        </header>

        <section id="summary-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 glass-card p-8 rounded-[2rem] shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-slate-800">Cash Flow Trend</h3>
                    <select class="bg-slate-50 border-none text-xs font-bold text-slate-500 rounded-lg px-3 py-1 outline-none">
                        <option>Last 30 Days</option>
                    </select>
                </div>
                <canvas id="mainChart" height="120"></canvas>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="glass-card p-8 rounded-[2rem] shadow-sm flex-1">
                    <h3 class="font-bold text-slate-800 mb-6">Spending Insights</h3>
                    <div id="insights-list" class="space-y-6">
                        </div>
                </div>
            </div>
        </div>

        <section class="space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-end md:items-center gap-4">
                <h2 class="text-2xl font-bold px-2 border-l-4 border-indigo-600">Transaction History</h2>
                <div class="flex gap-3 w-full md:w-auto">
                    <div class="relative flex-1">
                        <input type="text" id="search" oninput="handleSearch(this.value)" placeholder="Search merchants..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-3 top-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <select onchange="handleFilter(this.value)" class="px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-bold outline-none">
                        <option value="all">All Types</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
            </div>

            <div class="glass-card rounded-[2rem] shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Description</th>
                                <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Category</th>
                                <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest text-right">Amount</th>
                                <th id="action-th" class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest text-center hidden">Access</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100/60">
                            </tbody>
                    </table>
                </div>
                <div id="no-data" class="hidden py-20 text-center">
                    <p class="text-slate-400 font-medium italic">No matching transactions found.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- DATA STATE ---
        let state = {
            role: 'Viewer',
            search: '',
            filter: 'all',
            transactions: [
                { id: 1, date: '2026-03-28', amount: 4800, category: 'Revenue', type: 'income', desc: 'Q1 Performance Bonus' },
                { id: 2, date: '2026-03-27', amount: 145.20, category: 'Dining', type: 'expense', desc: 'Skyline Restaurant' },
                { id: 3, date: '2026-03-26', amount: 2000, category: 'Housing', type: 'expense', desc: 'Central Park Apt 4B' },
                { id: 4, date: '2026-03-25', amount: 65, category: 'Transport', type: 'expense', desc: 'Waymo Ride' },
                { id: 5, date: '2026-03-24', amount: 320, category: 'Services', type: 'expense', desc: 'AWS Cloud Services' },
                { id: 6, date: '2026-03-23', amount: 850, category: 'Freelance', type: 'income', desc: 'Consulting - Fintech UI' }
            ]
        };

        let activeChart = null;

        // --- CORE ENGINE ---
        function init() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            render();
        }

        function render() {
            renderSummary();
            renderTable();
            renderInsights();
            renderCharts();
            updateRoleUI();
        }

        function renderSummary() {
            const income = state.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = state.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const balance = income - expense;

            document.getElementById('summary-grid').innerHTML = `
                <div class="glass-card p-8 rounded-[2rem] shadow-sm relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-indigo-50 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-500"></div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Net Balance</p>
                    <p class="text-4xl font-black text-slate-900">$${balance.toLocaleString()}</p>
                    <div class="mt-4 flex items-center gap-2 text-emerald-500 text-xs font-bold">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12 7a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0V8.414l-4.293 4.293a1 1 0 01-1.414 0L8 10.414l-4.293 4.293a1 1 0 01-1.414-1.414l5-5a1 1 0 011.414 0L11 10.586 14.586 7H12z" clip-rule="evenodd" />
                        </svg>
                        +12.5% vs last month
                    </div>
                </div>
                <div class="glass-card p-8 rounded-[2rem] shadow-sm">
                    <p class="text-xs font-bold text-emerald-500 uppercase tracking-wider mb-2">Monthly Income</p>
                    <p class="text-4xl font-black text-emerald-600">+$${income.toLocaleString()}</p>
                    <p class="mt-4 text-slate-400 text-xs font-medium">Auto-deposits active</p>
                </div>
                <div class="glass-card p-8 rounded-[2rem] shadow-sm">
                    <p class="text-xs font-bold text-rose-500 uppercase tracking-wider mb-2">Monthly Outflow</p>
                    <p class="text-4xl font-black text-rose-600">-$${expense.toLocaleString()}</p>
                    <p class="mt-4 text-slate-400 text-xs font-medium">${state.transactions.filter(t => t.type === 'expense').length} transactions total</p>
                </div>
            `;
        }

        function renderTable() {
            const container = document.getElementById('table-body');
            const filtered = state.transactions.filter(t => {
                const matchesSearch = t.desc.toLowerCase().includes(state.search.toLowerCase());
                const matchesFilter = state.filter === 'all' || t.type === state.filter;
                return matchesSearch && matchesFilter;
            });

            document.getElementById('no-data').classList.toggle('hidden', filtered.length > 0);
            
            container.innerHTML = filtered.map(t => `
                <tr class="group hover:bg-slate-50/50 transition-all duration-200">
                    <td class="px-8 py-5">
                        <p class="font-bold text-slate-800 group-hover:text-indigo-600 transition-colors">${t.desc}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-tighter">${t.date}</p>
                    </td>
                    <td class="px-8 py-5">
                        <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-lg text-[10px] font-extrabold uppercase tracking-widest">${t.category}</span>
                    </td>
                    <td class="px-8 py-5 text-right font-black ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-900'}">
                        ${t.type === 'income' ? '+' : '-'}$${t.amount.toLocaleString()}
                    </td>
                    ${state.role === 'Admin' ? `
                        <td class="px-8 py-5 text-center">
                            <button onclick="removeTrans(${t.id})" class="text-slate-300 hover:text-rose-500 transition-all active:scale-90">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </td>
                    ` : ''}
                </tr>
            `).join('');
        }

        function renderInsights() {
            const expenses = state.transactions.filter(t => t.type === 'expense');
            const catMap = expenses.reduce((a, b) => { a[b.category] = (a[b.category] || 0) + b.amount; return a; }, {});
            const topCat = Object.keys(catMap).reduce((a, b) => catMap[a] > catMap[b] ? a : b, 'N/A');

            document.getElementById('insights-list').innerHTML = `
                <div class="flex items-start gap-4 group">
                    <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 font-bold text-xs shrink-0 group-hover:bg-indigo-600 group-hover:text-white transition-all">01</div>
                    <div>
                        <p class="text-sm font-bold text-slate-800">Top Spend</p>
                        <p class="text-xs text-slate-500 mt-1 leading-relaxed">Your highest expenditure is <strong>${topCat}</strong>. You could save ~$150/mo by optimizing this category.</p>
                    </div>
                </div>
                <div class="flex items-start gap-4 group">
                    <div class="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600 font-bold text-xs shrink-0 group-hover:bg-emerald-600 group-hover:text-white transition-all">02</div>
                    <div>
                        <p class="text-sm font-bold text-slate-800">Savings Target</p>
                        <p class="text-xs text-slate-500 mt-1 leading-relaxed">You've saved <strong>28%</strong> of your income this month. You're on track for your yearly goal.</p>
                    </div>
                </div>
            `;
        }

        // --- INTERACTIVITY ---
        function updateRole(newRole) {
            state.role = newRole;
            render();
        }

        function updateRoleUI() {
            const isAdmin = state.role === 'Admin';
            
            // Toggle Buttons
            document.getElementById('role-Viewer').className = state.role === 'Viewer' ? 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-indigo-600' : 'px-5 py-2 rounded-xl text-xs font-bold text-slate-500';
            document.getElementById('role-Admin').className = state.role === 'Admin' ? 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-indigo-600' : 'px-5 py-2 rounded-xl text-xs font-bold text-slate-500';
            
            // Toggle Content
            document.getElementById('admin-actions').classList.toggle('hidden', !isAdmin);
            document.getElementById('action-th').classList.toggle('hidden', !isAdmin);
        }

        function handleSearch(v) { state.search = v; renderTable(); }
        function handleFilter(v) { state.filter = v; renderTable(); }
        function removeTrans(id) { 
            state.transactions = state.transactions.filter(t => t.id !== id); 
            render(); 
        }

        function renderCharts() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (activeChart) activeChart.destroy();

            activeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mar 22', 'Mar 24', 'Mar 26', 'Mar 28'],
                    datasets: [{
                        label: 'Balance',
                        data: [4200, 4800, 3200, 3850],
                        borderColor: '#4F46E5',
                        borderWidth: 4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: (context) => {
                            const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 300);
                            gradient.addColorStop(0, 'rgba(79, 70, 229, 0.1)');
                            gradient.addColorStop(1, 'rgba(79, 70, 229, 0)');
                            return gradient;
                        },
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, grid: { display: false } },
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 }, color: '#94a3b8' } }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
